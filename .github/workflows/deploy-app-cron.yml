# Pre-merge scheduling shim. GitHub only honors `schedule:` triggers from the
# default branch, but the monitoring app + its deploy workflow live on
# feat/niger-benue-multistate-monitoring until merged. This shim (on main)
# checks out that branch and runs the same deploy steps on a cron.
# DELETE this file once the feature branch is merged and deploy-app.yml's own
# schedule takes over from the default branch.

name: deploy-app-cron

on:
  schedule:
    - cron: "23 */6 * * *"   # every 6 h — refreshes live Google + GloFAS forecasts
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/niger-benue-multistate-monitoring

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install export dependencies
        run: |
          pip install --quiet ocha-stratus geopandas pyarrow python-dotenv \
            xarray requests cdsapi cfgrib eccodes tqdm

      - name: Export app data from blob
        env:
          PYTHONPATH: .
          DSCI_AZ_BLOB_DEV_SAS: ${{ secrets.DSCI_AZ_BLOB_DEV_SAS }}
          DSCI_AZ_BLOB_PROD_SAS: ${{ secrets.DSCI_AZ_BLOB_PROD_SAS }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CDSAPI_URL: ${{ secrets.CDSAPI_URL }}
          CDSAPI_KEY: ${{ secrets.CDSAPI_KEY }}
        run: python pipelines/export_app_data.py

      - name: Assemble site
        run: |
          mkdir -p _site
          rsync -a --exclude '.git' --exclude '.venv' --exclude '_site' \
            --exclude '__pycache__' --exclude '.quarto' --exclude 'temp' \
            ./ _site/
          if [ ! -f _site/index.html ]; then
            cat > _site/index.html <<'HTML'
          <!DOCTYPE html><html><head><meta charset="utf-8">
          <title>ds-aa-nga-flooding</title></head><body style="font-family:sans-serif;margin:3em">
          <h1>Nigeria flooding — anticipatory action</h1>
          <ul>
            <li><a href="app/">Niger/Benue flood-trigger monitoring app</a></li>
            <li><a href="exploration/2026/cerf/notes/">2026 CERF analysis notes</a></li>
            <li><a href="exploration/2026/cerf/web/">2026 CERF web map</a></li>
          </ul></body></html>
          HTML
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
